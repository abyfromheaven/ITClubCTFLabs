<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITClubNet - Layanan Internet Komunitas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            padding: 40px 60px;
            text-align: center;
            max-width: 700px;
            margin: 20px;
        }
        h1 {
            color: #2c3e50;
            font-size: 2.8em;
            margin-bottom: 10px;
        }
        h2 {
            color: #34495e;
            font-size: 1.5em;
            margin-top: 0;
            font-weight: normal;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        .button {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #2980b9;
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            color: #7f8c8d;
            font-size: 0.9em;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ITClubNet</h1>
        <h2>Penyedia layanan internet komunitas IT Club SMK 1 Triple "J"</h2>
        <p>Internet stabil buat belajar, ngoding, dan begadang tanpa drama.</p>
        <a href="/tagihan?id=1" class="button">Cek Tagihan</a>
    </div>
    <footer>
        &copy; ITClubNet Internal System
    </footer>
</body>
</html>
