{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="dashboard-container">
    <h1>Welcome, {{ username }}!</h1>
    <p>Selamat datang di IT Club Tech Store. Gunakan menu navigasi di atas untuk menjelajahi fitur aplikasi.</p>

        <a href="{{ url_for('manage_address') }}" class="btn btn-secondary">Manage Your Address</a>

</div>
{% endblock %}
