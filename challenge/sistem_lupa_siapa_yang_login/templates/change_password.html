{% extends "base.html" %}

{% block title %}Ganti Password{% endblock %}

{% block content %}
    <h2>Ganti Password Anda</h2>
    <p>Masukkan password baru Anda di bawah ini.</p>
    <hr>
    
    <form method="POST" action="{{ url_for('change_password') }}">
        <div class="form-group">
            <label for="new_password">Password Baru</label>
            <input type="password" id="new_password" name="new_password" required>
        </div>
        
        <!-- 
            !!! BAGIAN PENTING UNTUK EXPLOIT !!! 
            Input di bawah ini tidak terlihat di UI, tetapi nilainya akan dikirim ke server.
            Penyerang harus mencegat request ini (misalnya dengan Burp Suite)
            dan mengubah 'value' dari user_id ini ke ID user lain.
            
            Contoh: Saat login sebagai 'abiyan', value-nya adalah '1'.
            Ubah menjadi '2' untuk menargetkan 'joshua'.
        -->
        <input type="hidden" name="user_id" value="{{ user_id }}">
        
        <button type="submit" class="btn">Ubah Password</button>
    </form>
{% endblock %}
