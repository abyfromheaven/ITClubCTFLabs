{% extends "layout.html" %}

{% block content %}
<div class="header">
    <h1>Transfer Saldo</h1>
    <p>Kirim saldo ke sesama anggota IT Club.</p>
</div>

<div class="card">
    <h3>Formulir Transfer</h3>
    <form method="POST" action="{{ url_for('transfer') }}" class="transfer-form">
        
        <!-- 
            Bagian ini adalah kunci dari ilusi keamanan.
            User melihat info pengirim sebagai teks, tapi 'from_user_id' dikirim lewat hidden input.
            Penyerang harus menemukan parameter ini di request body untuk dieksploitasi.
        -->
        <div class="form-group">
            <label>Dari Akun</label>
            <p class="static-info">{{ current_user.username }} (ID: {{ current_user_id }})</p>
            <input type="hidden" name="from_user_id" value="{{ current_user_id }}">
        </div>

        <div class="form-group">
            <label for="to_user_id">Kirim Ke</label>
            <select id="to_user_id" name="to_user_id" required>
                <option value="" disabled selected>-- Pilih Penerima --</option>
                {% for user in users %}
                    <option value="{{ user.user_id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Jumlah Transfer</label>
            <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input type="number" id="amount" name="amount" placeholder="Contoh: 50000" required min="1">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Kirim Sekarang</button>
    </form>
</div>
{% endblock %}
